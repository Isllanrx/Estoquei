<div class="message-container">
  <div class="message-header">
    <div class="user-info">
      <label class="image-upload-label">
        <img
          [src]="getImageUrl(currentUser()?.imagem || '')"
          [alt]="currentUser()?.nome"
          class="user-avatar"
          (error)="onImageError($event)"
        />
      </label>
      <span class="user-name">{{ currentUser()?.nome }}</span>
    </div>
    <button (click)="logout()" class="logout-button">Logout</button>
  </div>

  <div class="message-list">
    <!-- Use publicMessages computed signal -->
    <div *ngFor="let message of publicMessages()" class="message-item">
      <div class="message-user">
        <img
          [src]="getImageUrl(message.autorId.imagem)"
          [alt]="message.autorId.nome"
          class="user-avatar"
          (error)="onImageError($event)"
        />
        <span class="user-name">{{ message.autorId.nome }}</span>
      </div>
      
      <div
        class="message-content"
        [ngClass]="'message-content-type-' + message.type"
      >
        <!-- Edit Mode Logic using Signal editingMessageId -->
        <div *ngIf="editingMessageId() !== message._id">
          <p>{{ message.content }}</p>
          <span class="message-time">{{ message.createdAt | date : "short" }}</span>
          
          <div
            class="message-actions"
            *ngIf="currentUser()?._id === message.autorId._id"
          >
            <button
              class="action-button edit-button"
              (click)="startEdit(message)"
            >
              <i class="fas fa-edit"></i> Editar
            </button>
            <button
              class="action-button delete-button"
              (click)="deleteMessage(message)"
            >
              <i class="fas fa-trash"></i> Excluir
            </button>
          </div>
        </div>

        <div *ngIf="editingMessageId() === message._id" class="edit-form">
          <input
            type="text"
            [ngModel]="editedContent()"
            (ngModelChange)="editedContent.set($event)"
            (keyup.enter)="saveEdit(message)"
            (keyup.escape)="cancelEdit()"
          />
          <div class="edit-actions">
            <button class="save-button" (click)="saveEdit(message)">
              Salvar
            </button>
            <button class="cancel-button" (click)="cancelEdit()">
              Cancelar
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="message-input message-input-vertical">
    <div class="input-row">
      <button class="private-message-button" routerLink="/private-messages">
        <i class="fas fa-envelope"></i> Mensagens Privadas
      </button>
    </div>
    <div class="input-row">
      <label for="message-type">Tipo Mensagem: </label>
      <select
        class="message-type-selector message-type-selector-below"
        [ngModel]="selectedMessageType()"
        (ngModelChange)="selectedMessageType.set($event)"
        id="message-type"
      >
        <option value="message">Mensagem</option>
        <option value="alert">Alerta</option>
        <option value="info">Informação</option>
      </select>
    </div>
    <div class="input-row">
      <input
        type="text"
        [ngModel]="newMessage()"
        (ngModelChange)="newMessage.set($event)"
        placeholder="Digite sua mensagem..."
        (keyup.enter)="sendMessage()"
      />
      <button (click)="sendMessage()">Enviar</button>
    </div>
  </div>
</div>
